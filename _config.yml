# Site configuration for Nicolas Lescalier U.S. market

# Basic settings
url: "https://nicolaslescalier.com"
title: "Nicolas Lescalier | U.S. Business Financing"
description: "Trusted U.S. business financing specialist helping small and mid-sized companies secure working capital loans, term loans, bridge loans and commercial real estate financing."
google_analytics_id: "G-F2SD579BRL"

# Plugins to automatically generate SEO metadata and sitemap
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-redirect-from

# Optional: exclude vendor or tooling directories
exclude:
  - vendor

# Markdown processing
markdown: kramdown

# Default layout assignment for pages
defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: default
