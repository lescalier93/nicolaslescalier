{% if site.google_analytics_id %}
<script async src="https://www.googletagmanager.com/gtag/js?id={{ site.google_analytics_id }}"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag() {
    dataLayer.push(arguments);
  }
  gtag("js", new Date());
  gtag("config", "{{ site.google_analytics_id }}", {
    anonymize_ip: true,
  });
</script>
{% endif %}
<script>
  (() => {
    window.dataLayer = window.dataLayer || [];
    const startedForms = new WeakSet();

    window.nicolasTrack = (eventName, params = {}) => {
      const payload = {
        page_path: window.location.pathname,
        page_title: document.title,
        ...params,
      };

      try {
        window.dataLayer.push({ event: eventName, ...payload });
      } catch (error) {
        console.debug("Tracking push failed", error);
      }

      if (typeof window.gtag === "function") {
        window.gtag("event", eventName, payload);
      }

      if (typeof window.plausible === "function") {
        window.plausible(eventName, { props: payload });
      }

      window.dispatchEvent(new CustomEvent("nicolas-track", {
        detail: { eventName, payload },
      }));
    };

    const normalizeText = (value) => String(value || "").replace(/\s+/g, " ").trim().slice(0, 120);

    const sanitizeTarget = (value) => {
      if (!value) {
        return "";
      }
      if (value.startsWith("http")) {
        try {
          const url = new URL(value);
          return `${url.origin}${url.pathname}`;
        } catch (error) {
          return value;
        }
      }
      return value;
    };

    const classifyTarget = (target) => {
      if (!target) return "button";
      if (target.includes("/apply/")) return "apply";
      if (target.includes("/contact/")) return "contact";
      if (target.includes("calendly.com")) return "booking";
      if (target.includes("calculator")) return "calculator";
      if (target.includes("/services/")) return "service";
      if (target.includes("/resources")) return "resource";
      if (target.includes("/application-checklist/")) return "checklist";
      if (target.includes("linkedin.com")) return "profile";
      if (target.startsWith("tel:")) return "phone";
      return target.startsWith("#") ? "jump_link" : "link";
    };

    const sectionLabel = (node) => {
      const section = node.closest("section");
      if (!section) {
        return "site";
      }
      const heading = section.querySelector("h1, h2, h3");
      return normalizeText(heading?.textContent || section.id || "section");
    };

    document.addEventListener("click", (event) => {
      const target = event.target.closest("a, button");
      if (!target) {
        return;
      }

      const href = target.getAttribute("href") || target.getAttribute("data-href") || "";
      const text = normalizeText(target.dataset.trackLabel || target.textContent || target.getAttribute("aria-label"));
      const isCta = target.classList.contains("button") || target.classList.contains("button--nav") || target.closest(".cta-row");
      const isNav = !!target.closest("nav") || !!target.closest(".site-footer");
      const isTrackedLink = isCta
        || isNav
        || href.includes("/apply/")
        || href.includes("/contact/")
        || href.includes("calendly.com")
        || href.includes("calculator")
        || href.startsWith("tel:")
        || href.includes("linkedin.com");

      if (target.matches("[data-nav-toggle]")) {
        window.nicolasTrack("nav_toggle", {
          nav_state: target.getAttribute("aria-expanded") === "true" ? "open" : "closed",
        });
        return;
      }

      if (!isTrackedLink) {
        return;
      }

      window.nicolasTrack(isNav && !isCta ? "nav_click" : "cta_click", {
        cta_label: text || "Unnamed CTA",
        cta_target: sanitizeTarget(href),
        cta_type: classifyTarget(href),
        cta_section: sectionLabel(target),
      });
    });

    document.addEventListener("focusin", (event) => {
      const form = event.target.closest("form");
      if (!form || startedForms.has(form)) {
        return;
      }
      startedForms.add(form);
      window.nicolasTrack("form_started", {
        form_name: form.getAttribute("name") || form.id || form.getAttribute("action") || "form",
        form_target: sanitizeTarget(form.getAttribute("action") || ""),
      });
    });

    document.addEventListener("submit", (event) => {
      const form = event.target;
      if (!(form instanceof HTMLFormElement)) {
        return;
      }
      window.nicolasTrack("form_submit", {
        form_name: form.getAttribute("name") || form.id || form.getAttribute("action") || "form",
        form_target: sanitizeTarget(form.getAttribute("action") || ""),
      });
    });
  })();
</script>
