{% assign current_url = page.url | default: '/' %}
{% assign page_label = page.title | split: ' | ' | first %}
{% unless current_url == '/' %}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "BreadcrumbList",
  "itemListElement": [
    {
      "@type": "ListItem",
      "position": 1,
      "name": "Home",
      "item": {{ '/' | absolute_url | jsonify }}
    }
    {% if current_url == '/services/' %}
    ,{
      "@type": "ListItem",
      "position": 2,
      "name": "Services",
      "item": {{ '/services/' | absolute_url | jsonify }}
    }
    {% elsif current_url contains '/services/' %}
    ,{
      "@type": "ListItem",
      "position": 2,
      "name": "Services",
      "item": {{ '/services/' | absolute_url | jsonify }}
    }
    ,{
      "@type": "ListItem",
      "position": 3,
      "name": {{ page_label | jsonify }},
      "item": {{ current_url | absolute_url | jsonify }}
    }
    {% elsif current_url == '/working-capital-calculator.html' or current_url == '/term-loan-calculator.html' %}
    ,{
      "@type": "ListItem",
      "position": 2,
      "name": "Resources",
      "item": {{ '/resources.html' | absolute_url | jsonify }}
    }
    ,{
      "@type": "ListItem",
      "position": 3,
      "name": {{ page_label | jsonify }},
      "item": {{ current_url | absolute_url | jsonify }}
    }
    {% elsif current_url == '/contact-thank-you/' %}
    ,{
      "@type": "ListItem",
      "position": 2,
      "name": "Contact",
      "item": {{ '/contact/' | absolute_url | jsonify }}
    }
    ,{
      "@type": "ListItem",
      "position": 3,
      "name": {{ page_label | jsonify }},
      "item": {{ current_url | absolute_url | jsonify }}
    }
    {% elsif current_url == '/application-received/' %}
    ,{
      "@type": "ListItem",
      "position": 2,
      "name": "Application",
      "item": {{ '/apply/' | absolute_url | jsonify }}
    }
    ,{
      "@type": "ListItem",
      "position": 3,
      "name": {{ page_label | jsonify }},
      "item": {{ current_url | absolute_url | jsonify }}
    }
    {% else %}
    ,{
      "@type": "ListItem",
      "position": 2,
      "name": {{ page_label | jsonify }},
      "item": {{ current_url | absolute_url | jsonify }}
    }
    {% endif %}
  ]
}
</script>
{% endunless %}
